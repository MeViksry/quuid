name: Bug report
description: Report a reproducible defect in quuid
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not report undisclosed vulnerabilities here. Follow SECURITY.md and use private vulnerability reporting.
  - type: input
    id: version
    attributes:
      label: quuid version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: go1.26.0
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system and architecture
      placeholder: Linux amd64
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide the smallest complete program or test that demonstrates the problem.
      render: go
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include database driver, ORM, UUID representation, stack trace, or migration details when relevant.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  HOME: /root
  GOCACHE: /tmp/go-cache
  GOPATH: /tmp/go-path

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go ${{ matrix.go-version }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.23.x', '1.24.x', '1.25.x', '1.26.x']
        os: [self-hosted]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: false
      - run: go test ./...

  quality:
    name: Quality and security
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: false
      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: Run race detector
        run: go test -race ./...
      - name: Run go vet
        run: go vet ./...
      - name: Reject legacy hash dependencies
        shell: bash
        run: |
          if go list -deps ./... | grep -E '^crypto/(md5|sha1)$'; then
            echo "crypto/md5 or crypto/sha1 was found in the dependency tree"
            exit 1
          fi
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
      - name: Build all packages
        run: go build ./...

name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  HOME: /root
  GOCACHE: /tmp/go-cache
  GOPATH: /tmp/go-path
  GO_VERSION: '1.23.x'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify release candidate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease"
            exit 1
          fi
      - name: Run unit tests
        run: go test ./...
      - name: Run race detector
        run: go test -race ./...
      - name: Run go vet
        run: go vet ./...
      - name: Reject legacy hash dependencies
        run: make legacy-hash-check
      - name: Build all packages
        run: go build ./...

  publish:
    name: Publish GitHub Release
    needs: verify
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::12}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            release_title="${GITHUB_REF_NAME}"
            binary_version="${GITHUB_REF_NAME}"
            archive_version="${GITHUB_REF_NAME}"
            prerelease="false"
            if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
              prerelease="true"
            fi
          else
            release_tag="nightly"
            release_title="Nightly build"
            binary_version="nightly-${short_sha}"
            archive_version="nightly"
            prerelease="true"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_title=${release_title}"
            echo "binary_version=${binary_version}"
            echo "archive_version=${archive_version}"
            echo "prerelease=${prerelease}"
            echo "short_sha=${short_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Update nightly tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly "${GITHUB_SHA}"
          git push origin refs/tags/nightly --force

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.meta.outputs.binary_version }}"
          archive_version="${{ steps.meta.outputs.archive_version }}"
          commit="${GITHUB_SHA}"
          built="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X main.version=${version} -X main.commit=${commit} -X main.date=${built}"

          mkdir -p dist
          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )

          for target in "${targets[@]}"; do
            goos="${target%/*}"
            goarch="${target#*/}"
            name="quuid_${archive_version}_${goos}_${goarch}"
            workdir="dist/${name}"
            mkdir -p "${workdir}"

            binary="quuid"
            if [[ "${goos}" == "windows" ]]; then
              binary="quuid.exe"
            fi

            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags "${ldflags}" -o "${workdir}/${binary}" ./cmd/quuid

            cp README.md LICENSE "${workdir}/"
            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            rm -rf "${workdir}"
          done

          (cd dist && sha256sum *.tar.gz > checksums.txt)

      - name: Publish nightly release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_title }}
          body: Automated nightly build from ${{ github.sha }}.
          prerelease: true
          make_latest: false
          files: dist/*
          overwrite_files: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_title }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.prerelease == 'false' }}
          files: dist/*
          overwrite_files: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

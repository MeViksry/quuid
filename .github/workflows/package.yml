name: Package

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  HOME: /root
  GOCACHE: /tmp/go-cache
  GOPATH: /tmp/go-path
  GO_VERSION: '1.23.x'
  DOCKER_GO_VERSION: '1.23'
  REGISTRY: ghcr.io

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-container:
    name: Publish GHCR image
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Package release tags must use vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease"
            exit 1
          fi

      - name: Test before packaging
        run: go test ./...

      - name: Check Docker availability
        run: |
          docker version
          docker info

      - name: Log in to GitHub Container Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GITHUB_TOKEN}" | docker login "${REGISTRY}" -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build and publish image
        shell: bash
        run: |
          set -euo pipefail

          image="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          short_sha="${GITHUB_SHA::12}"
          built="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          version="dev-${short_sha}"
          tags=("${image}:sha-${short_sha}")

          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            tags+=("${image}:edge")
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
            tags+=("${image}:${GITHUB_REF_NAME}")
            if [[ "${GITHUB_REF_NAME}" != *-* ]]; then
              tags+=("${image}:latest")
            fi
          fi

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=("-t" "${tag}")
          done

          docker build "${tag_args[@]}" \
            --build-arg GO_VERSION="${DOCKER_GO_VERSION}" \
            --build-arg VERSION="${version}" \
            --build-arg COMMIT="${GITHUB_SHA}" \
            --build-arg DATE="${built}" \
            --label "org.opencontainers.image.created=${built}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${version}" \
            .

          for tag in "${tags[@]}"; do
            docker push "${tag}"
          done
